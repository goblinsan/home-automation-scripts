name: Deploy On Merge

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      revision:
        description: Optional git revision to deploy instead of the current workflow SHA
        required: false
        type: string

concurrency:
  group: gateway-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - gateway
    env:
      DEPLOY_REVISION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.revision || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build
      - run: deploy/bin/deploy-app.sh --config /opt/gateway-control-plane/configs/gateway.config.json --app gateway-control-plane --revision "${DEPLOY_REVISION}"
