# Home Automation Scripts – Tool Registry
#
# This file registers every automation tool that can be discovered by the
# ``automation`` CLI (tools/automation.py).
#
# Schema – each entry under ``tools`` supports the following fields:
#
#   name        (required) Unique identifier used in CLI commands.
#                          Use lowercase letters and hyphens (e.g. "github-helper").
#   description (optional) Short human-readable description shown by
#                          ``automation list``.  Defaults to "(no description)".
#   script      (required) Path to the Python script, relative to the
#                          repository root.  The script must expose a callable
#                          ``run()`` at module level.
#   enabled     (optional) Set to false to exclude a tool from discovery
#                          without removing the entry.  Defaults to true.

tools:
  - name: github-helper
    description: "List open GitHub issues and project board items for a repository"
    script: scripts/github_helper.py
    enabled: true
