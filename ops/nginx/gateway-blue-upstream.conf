# ops/nginx/gateway-blue-upstream.conf
#
# nginx upstream definition for the blue gateway instance.
#
# Use this file when blue is the active deployment colour.
# The deploy script writes the appropriate content to:
#   /etc/nginx/conf.d/gateway-active-upstream.conf
#
# To manually activate blue (e.g. for initial setup or emergency rollback):
#   sudo cp ops/nginx/gateway-blue-upstream.conf \
#            /etc/nginx/conf.d/gateway-active-upstream.conf
#   sudo nginx -s reload
#   echo "blue" | sudo tee /var/lib/home-automation/active_color

upstream gateway_active {
    # Blue gateway instance listens on port 8081.
    server 127.0.0.1:8081;

    # Maintain persistent connections to the upstream to reduce latency.
    keepalive 32;
}
