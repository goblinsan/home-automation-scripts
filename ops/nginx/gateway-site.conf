# =============================================================================
# ops/nginx/gateway-site.conf – nginx virtual-host config for the gateway.
#
# INSTALLATION
#   sudo cp ops/nginx/gateway-site.conf /etc/nginx/sites-available/gateway
#   sudo ln -s /etc/nginx/sites-available/gateway /etc/nginx/sites-enabled/gateway
#   sudo nginx -t && sudo nginx -s reload
#
# HOW IT WORKS
#   - Traffic is forwarded to the `gateway_active` upstream.
#   - The upstream definition lives in a separate file managed by deploy.sh:
#       /etc/nginx/conf.d/gateway-active-upstream.conf
#   - deploy.sh rewrites that file and reloads nginx to switch environments.
#   - On first run, copy one of the upstream examples:
#       sudo cp ops/nginx/gateway-blue-upstream.conf \
#                /etc/nginx/conf.d/gateway-active-upstream.conf
#
# ADJUST
#   - Change `server_name` to match your home network hostname or IP.
#   - Add TLS if the gateway is exposed beyond localhost.
# =============================================================================

# The active-upstream file is included from within the http context.
# It defines the `gateway_active` upstream block.
include /etc/nginx/conf.d/gateway-active-upstream.conf;

server {
    listen 80;
    listen [::]:80;

    # Replace with your gateway's hostname or local IP.
    # Use `_` to accept any hostname on this port.
    server_name gateway.home.local _;

    # ---------------------------------------------------------
    # Health check endpoint – allow nginx itself to probe it.
    # ---------------------------------------------------------
    location = /health {
        proxy_pass         http://gateway_active;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection "";
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;

        # Allow nginx health checks without rate limiting.
        access_log off;
    }

    # ---------------------------------------------------------
    # All other requests – forward to the active gateway instance.
    # ---------------------------------------------------------
    location / {
        proxy_pass         http://gateway_active;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Enable keep-alives to the upstream (matches keepalive 32 in upstream).
        proxy_set_header   Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout  30s;

        # Return a friendly error if the gateway is unreachable.
        proxy_intercept_errors on;
        error_page 502 503 504 /gateway_unavailable.html;
    }

    # ---------------------------------------------------------
    # Custom error page served locally by nginx when gateway is down.
    # ---------------------------------------------------------
    location = /gateway_unavailable.html {
        internal;
        root /var/www/html;
        try_files /gateway_unavailable.html =503;
    }
}
