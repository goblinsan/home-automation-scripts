# ops/nginx/gateway-green-upstream.conf
#
# nginx upstream definition for the green gateway instance.
#
# Use this file when green is the active deployment colour.
#
# To manually activate green:
#   sudo cp ops/nginx/gateway-green-upstream.conf \
#            /etc/nginx/conf.d/gateway-active-upstream.conf
#   sudo nginx -s reload
#   echo "green" | sudo tee /var/lib/home-automation/active_color

upstream gateway_active {
    # Green gateway instance listens on port 8082.
    server 127.0.0.1:8082;

    keepalive 32;
}
